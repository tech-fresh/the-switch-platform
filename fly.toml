# Fly.io free-tier persistence host (filesystem sqlite on a volume).
# Full steps: docs/FREE_TIER_DEPLOY.md

app = 'the-switch-platform'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  HOSTNAME = '0.0.0.0'
  SWITCH_PERSISTENCE_DRIVER = 'sqlite'
  SWITCH_DATA_DIRECTORY = '/data'
  SWITCH_CMS_BACKEND_MODE = 'live'
  SWITCH_AUTO_BOOTSTRAP_SQLITE = '1'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = 'switch_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
